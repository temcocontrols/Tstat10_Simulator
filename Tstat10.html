<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tstat10 Portable UI</title>
    <!-- Avoid 404 on automatic /favicon.ico request -->
    <link rel="icon" href="data:,">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        #app { max-width: 800px; margin: 40px auto; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 32px; border-radius: 8px; }
        h1 { color: #2c3e50; }
    </style>
    <link rel="stylesheet" href="simulator.css">
    <link rel="stylesheet" href="lcd-content.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Console pipe: on by default via npm start (tools/dev-server.mjs). Off: ?consolePipe=0 -->
    <script src="console-pipe-client.js"></script>
    <div id="app" style="position: relative; min-height: 600px;">
        <div class="sls-workbench">
            <div class="sls-topbar" role="banner">
                <div class="sls-topbar__left">
                    <div class="sls-topbar__brand" title="Tstat10 layout editor">Tstat10 <span class="sls-topbar__brand-sub">LCD</span></div>
                    <div class="sls-topbar__file" id="sls-file-readout">—</div>
                </div>
                <div class="sls-topbar__center">
                    <span class="sls-topbar__pill is-active">Editor</span>
                    <span class="sls-topbar__pill sls-topbar__pill--muted">Simulation</span>
                </div>
                <div class="sls-topbar__right">
                    <button type="button" class="sls-topbar__edit-lock" id="sls-edit-lock-toggle" title="Unlock layout edit (Tstat10)" aria-label="Unlock layout edit">🔒</button>
                    <span class="sls-topbar__screen" id="sls-screen-readout">—</span>
                    <button type="button" class="sls-topbar__fit" id="sls-fit-view" title="Fit view (reset zoom and pan)" aria-label="Fit view">⤢</button>
                    <div class="sls-zoom-toolbar" role="toolbar" aria-label="Canvas zoom">
                        <button type="button" class="sls-topbar__zoom-btn" id="sls-zoom-out" title="Zoom out (Ctrl −)" aria-label="Zoom out">−</button>
                        <button type="button" class="sls-topbar__zoom sls-topbar__zoom--readout" id="sls-zoom-readout" title="Click: 100% · Wheel on device: zoom · Ctrl+Plus/Minus · Middle-drag: pan · Alt+double-click: fit">100%</button>
                        <button type="button" class="sls-topbar__zoom-btn" id="sls-zoom-in" title="Zoom in (Ctrl +)" aria-label="Zoom in">+</button>
                    </div>
                </div>
            </div>
        <div class="app-main-row">
            <div id="layout-widgets-panel" class="layout-widgets-panel debug-ui-hidden" aria-label="Widget palette">
                <div class="layout-widgets-panel__header layout-widgets-panel__header--row">
                    <span class="layout-widgets-panel__title">Widgets</span>
                    <button type="button" id="btn-lock-save" class="layout-widgets-panel__play-btn" title="Edit layout">Edit</button>
                </div>
                <div class="layout-widgets-panel__body">
                    <section class="layout-widgets-section" aria-label="Basic widgets">
                        <div class="layout-widgets-section__title">Basic</div>
                        <div class="layout-widgets-grid layout-widgets-grid--2">
                            <button type="button" class="layout-widgets-tile" data-widget-add="text" title="Add a text label">Text</button>
                            <button type="button" class="layout-widgets-tile" data-widget-add="icon" title="Add SVG icon from library">Icon</button>
                        </div>
                    </section>
                    <section class="layout-widgets-section" aria-label="Row widgets">
                        <div class="layout-widgets-section__title">Rows</div>
                        <div class="layout-widgets-grid layout-widgets-grid--2">
                            <button type="button" class="layout-widgets-tile" data-widget-add="box" title="Label + value row">Param row</button>
                            <button type="button" class="layout-widgets-tile" data-widget-add="row" title="Full-width menu row">Menu row</button>
                        </div>
                    </section>
                    <section class="layout-widgets-section" aria-label="Icon library">
                        <div class="layout-widgets-section__title">Icon library</div>
                        <div id="layout-icon-palette-host"></div>
                    </section>
                </div>
            </div>
            <div id="debug-toggles" class="debug-panel-wrap">
                <div id="layout-tree-panel" class="layout-tree-panel debug-ui-hidden" aria-label="Layout item tree">
                    <div class="layout-tree-panel__tabs" role="tablist" aria-label="Panel tabs">
                        <button type="button" class="layout-tree-panel__tab is-active" role="tab" aria-selected="true" data-layout-tree-tab="hierarchy">Hierarchy</button>
                        <button type="button" class="layout-tree-panel__tab" role="tab" aria-selected="false" disabled title="Not wired in simulator">Console</button>
                    </div>
                    <div class="layout-tree-panel__toolbar">
                        <label class="layout-tree-panel__search">
                            <span class="layout-tree-panel__search-icon" aria-hidden="true">
                                <svg width="14" height="14" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7 12A5 5 0 1 0 7 2a5 5 0 0 0 0 10Zm0-1.2A3.8 3.8 0 1 1 7 3.2a3.8 3.8 0 0 1 0 7.6Z" fill="currentColor" opacity=".55"/><path d="m10.9 11.1 3.5 3.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" opacity=".55"/></svg>
                            </span>
                            <input id="layout-tree-search" type="search" placeholder="Enter text..." autocomplete="off" />
                        </label>
                    </div>
                    <div id="layout-tree-content" class="layout-tree-panel__content"></div>
                </div>
            </div>
            <div id="tstat-container" class="tstat-device-shell">
            <img id="ref-photo" src="" style="
                position: absolute; 
                top: 0; left: 0; 
                width: 100%; height: 100%; 
                z-index: 100; 
                opacity: 0.5; 
                pointer-events: none; 
                display: none;">
            <div class="device-bezel">
                <!-- <div class="vent-slots"></div> -->
                <div id="tstat-lcd-container"></div>
                                <div class="compass-logo">
                                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                        <!-- Outer grey circle removed -->
                                        <!-- Main NEWS arrows -->
                                        <polygon points="50,10 54,30 50,26 46,30" fill="#888" /> <!-- N -->
                                        <polygon points="90,50 70,54 74,50 70,46" fill="#888" /> <!-- E -->
                                        <polygon points="50,90 54,70 50,74 46,70" fill="#888" /> <!-- S -->
                                        <polygon points="10,50 30,54 26,50 30,46" fill="#888" /> <!-- W -->
                                        <!-- 12 small ticks/arrows -->
                                        <g stroke="#bbb" stroke-width="1.2">
                                            <line x1="50" y1="18" x2="50" y2="26" />
                                            <line x1="50" y1="82" x2="50" y2="74" />
                                            <line x1="18" y1="50" x2="26" y2="50" />
                                            <line x1="82" y1="50" x2="74" y2="50" />
                                            <line x1="32" y1="32" x2="38" y2="38" />
                                            <line x1="68" y1="32" x2="62" y2="38" />
                                            <line x1="32" y1="68" x2="38" y2="62" />
                                            <line x1="68" y1="68" x2="62" y2="62" />
                                            <line x1="50" y1="10" x2="50" y2="18" />
                                            <line x1="50" y1="90" x2="50" y2="82" />
                                            <line x1="10" y1="50" x2="18" y2="50" />
                                            <line x1="90" y1="50" x2="82" y2="50" />
                                        </g>
                                    </svg>
                                </div>
                <div class="physical-buttons">
                    <button class="hw-btn" id="hw-btn-left">◀</button>
                    <button class="hw-btn" id="hw-btn-down">▼</button>
                    <button class="hw-btn" id="hw-btn-up">▲</button>
                    <button class="hw-btn" id="hw-btn-right">▶</button>
                </div>
                <!-- Last in bezel so paint/hit-test order stays above LCD; z-index also set in CSS -->
                <button
                    type="button"
                    id="thermostat-lock-toggle"
                    class="thermostat-lock-toggle"
                    aria-label="Toggle layout edit mode"
                    title="Toggle layout edit mode"
                >🔓</button>
                <button
                    type="button"
                    id="phone-send-creds-btn"
                    class="phone-send-creds-btn phone-send-creds-btn--hidden"
                    aria-label="Send password from phone (simulated)"
                    title="Dev shortcut: same as Get Password — simulate the app sending the home Wi‑Fi password (provisioning only)"
                >📱</button>
            </div>
            <div id="layout-props-panel" class="layout-props-panel debug-ui-hidden" aria-label="Selected element properties">
                <div class="layout-props-panel__header">
                    <div class="layout-props-panel__tabs" role="tablist" aria-label="Inspector panels (SquareLine-style)">
                        <span class="layout-props-panel__tab is-active" role="tab" aria-selected="true">Inspector</span>
                        <span class="layout-props-panel__tab" role="tab" aria-selected="false">History</span>
                        <span class="layout-props-panel__tab" role="tab" aria-selected="false">Font Manager</span>
                        <span class="layout-props-panel__tab" role="tab" aria-selected="false">D&amp;D</span>
                        <span class="layout-props-panel__tab" role="tab" aria-selected="false">Animations</span>
                    </div>
                </div>
                <div id="layout-props-screen-section" class="layout-props-screen-section" aria-label="Screen canvas">
                    <div class="layout-props-screen-section__title">Screen</div>
                    <div class="layout-props-screen-section__grid">
                        <label class="layout-props-screen-section__field">Width <input id="editor-canvas-width" type="number" min="1" value="320"></label>
                        <label class="layout-props-screen-section__field">Height <input id="editor-canvas-height" type="number" min="1" value="480"></label>
                        <label class="layout-props-screen-section__field">Orientation
                            <select id="editor-orientation">
                                <option value="vertical">vertical</option>
                                <option value="horizontal">horizontal</option>
                            </select>
                        </label>
                        <label class="layout-props-screen-section__field">Color mode
                            <select id="editor-color-mode">
                                <option value="indexed">indexed</option>
                                <option value="reduced_rgb">reduced_rgb</option>
                            </select>
                        </label>
                    </div>
                </div>
                <div id="debug-event-panel" class="layout-props-debug-section" aria-label="Debug">
                    <div class="layout-props-debug-section__title">Debug</div>
                    <div class="layout-props-debug-section__inner">
                        <div class="layout-props-debug-section__toggles">
                            <label class="layout-props-debug-row"><span>Grid</span><input type="checkbox" id="toggle-grid-layer" checked></label>
                            <label class="layout-props-debug-row"><span>Auto test</span><input type="checkbox" id="toggle-autotester"></label>
                        </div>
                        <div id="keypad-debug-subpanel" class="layout-props-debug-live">
                            <div id="keypad-debug-content">
                                <div class="layout-props-debug-live__row">
                                    <span class="layout-props-debug-live__k">Key</span>
                                    <span id="debug-event-value" class="layout-props-debug-live__v">&nbsp;</span>
                                </div>
                                <div class="layout-props-debug-live__row">
                                    <span class="layout-props-debug-live__k">Focus</span>
                                    <span id="debug-focus-value" class="layout-props-debug-live__v">&nbsp;</span>
                                </div>
                                <div class="layout-props-debug-live__row">
                                    <span class="layout-props-debug-live__k">Value</span>
                                    <span id="debug-value-value" class="layout-props-debug-live__v">&nbsp;</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div id="layout-props-content" class="layout-props-panel__content"></div>
            </div>
        </div>
            <script>
            (function() {
                let lastJson = '';
                async function checkJsonChange() {
                    try {
                        const resp = await fetch('./network_settings.json?_=' + Date.now());
                        const text = await resp.text();
                        if (lastJson && text !== lastJson) {
                            location.reload();
                        }
                        lastJson = text;
                    } catch (e) {}
                    setTimeout(checkJsonChange, 1500);
                }
                checkJsonChange();
            })();
            (function() {
                let autotesterActive = false;
                let autotesterTimeout = null;
                function autoTestStep() {
                    if (!autotesterActive) return;
                    console.log('[AutoTester] Simulating ArrowRight key press');
                    window.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowRight', bubbles: true }));
                    setTimeout(() => {
                        if (!autotesterActive) return;
                        console.log('[AutoTester] Simulating ArrowUp key press');
                        window.dispatchEvent(new KeyboardEvent('keydown', { key: 'ArrowUp', bubbles: true }));
                        autotesterTimeout = setTimeout(autoTestStep, 3000);
                    }, 3000);
                }
                const checkbox = document.getElementById('toggle-autotester');
                if (checkbox) {
                    checkbox.addEventListener('change', function() {
                        autotesterActive = checkbox.checked;
                        if (autotesterActive) autoTestStep();
                        else if (autotesterTimeout) clearTimeout(autotesterTimeout);
                    });
                }
            })();
            </script>
            <script type="module" src="network-settings-renderer.js?v=20260426"></script>
            <script src="lcd-content.js"></script>
            <!-- Logic moved to ui-bridge.js for CSP compliance -->
        </div>
        <div class="sls-assets-strip" aria-label="Screen resources (SquareLine-style strip)">
            <span class="sls-assets-strip__title">Resources</span>
            <span class="sls-asset-chip">main_display.json</span>
            <span class="sls-asset-chip">Icons/*.svg</span>
            <span class="sls-asset-chip">tstat10_parameters.json</span>
            <span class="sls-asset-chip">mock_bridge.js</span>
        </div>
        </div>
    </div>
    <!-- Base64 image logic moved to ui-bridge.js for CSP compliance -->
    <script src="mock_bridge.js"></script>
    <script src="ui-bridge.js"></script>
</body>
</html>
