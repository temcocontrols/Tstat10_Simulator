# Lint + syntax check + Playwright smoke (starts dev-server via playwright.config).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint (zero warnings — same as pre-commit)
        run: npm run lint:ci

      - name: Doctor (env sanity)
        run: npm run doctor

      - name: Screen JSON schema (regenerate + drift check + validate fixtures)
        run: npm run validate:screens:ci

      - name: Syntax check (key modules)
        run: |
          node --check network-settings-renderer.js
          node --check lcd-editor-core.js
          node --check lcd-platform-presets.js
          node --check menu-ui.js
          node --check screen-paths.js
          node --check assets-strip-screen-registry.mjs
          node --check save-server.mjs

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: E2E smoke
        run: npm run test:e2e
        env:
          CI: true
