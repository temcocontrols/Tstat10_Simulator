<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tstat10 Portable UI</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        #app { max-width: 800px; margin: 40px auto; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 32px; border-radius: 8px; }
        h1 { color: #2c3e50; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Tstat10 Portable UI</h1>
        <div style="display: flex; flex-direction: row; align-items: flex-start; justify-content: center;">
            <div id="debug-toggles" style="margin-right: 24px; display: flex; flex-direction: column; gap: 16px;">
                <!-- Grid and Coords toggles moved to debug panel below -->
                <div id="debug-event-panel" style="margin-top: 18px; background: #f7f7f7; border: 2px solid #888; border-radius: 10px; box-shadow: 0 2px 12px #0002; padding: 0; min-width: 320px; max-width: 320px; width: 320px; font-family: 'Fira Mono', 'Consolas', 'Menlo', 'Monaco', 'Liberation Mono', 'Courier New', monospace; font-size: 1.08em; color: #222; position: absolute; left: 20px; top: 40px; z-index: 10000; cursor: move;">
                    <div id="debug-panel-title" style="background: #e0e0e0; border-bottom: 1px solid #bbb; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 1.08em; padding: 8px 16px; cursor: move; user-select: none;">Tstat10 Debug</div>
                    <div style="padding: 12px 18px; display: flex; flex-direction: column; gap: 0; align-items: flex-start; font-family: inherit; font-size: inherit;">
                                                <label style="font-family: inherit; font-size: inherit; color: #333; font-weight: bold; margin-bottom: 10px; user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; width: 100%; margin-top: 10px;">
                                                    <span style="flex:1; text-align: left;">Simulated Keypad</span>
                                                    <input type="checkbox" id="toggle-autotester" style="margin-left: 8px;">
                                                </label>
                        <label style="font-family: inherit; font-size: inherit; color: #333; font-weight: bold; margin-bottom: 2px; user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; width: 100%;">
                            <span style="flex:1; text-align: left;">Grid Layer</span>
                            <input type="checkbox" id="toggle-grid-layer" checked style="margin-left: 8px;">
                        </label>
                        <label style="font-family: inherit; font-size: inherit; color: #333; font-weight: bold; margin-bottom: 2px; user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; width: 100%;">
                            <span style="flex:1; text-align: left;">Coords</span>
                            <input type="checkbox" id="toggle-coords" style="margin-left: 8px;">
                        </label>
                        <label style="font-family: inherit; font-size: inherit; color: #333; font-weight: bold; margin-bottom: 10px; user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; width: 100%;">
                            <span style="flex:1; text-align: left;">Redbox</span>
                            <input type="checkbox" id="toggle-redbox" style="margin-left: 8px;">
                        </label>
                        <div id="redbox-coords" style="margin: 0 0 10px 0; display: flex; gap: 8px; align-items: center; min-width: 120px;">
                            <span style="font-weight: bold; color: #b00;">Redbox:</span>
                            <span style="display:inline-block; width: 2ch;"></span>
                            <button id="redbox-x-btn" style="width: 38px; min-width: 38px; max-width: 38px; height: 28px; font-family: inherit; font-size: 1em; font-weight: bold; color: #fff; background: #1976d2; border: none; border-radius: 6px;">X</button>
                            <button id="redbox-y-btn" style="width: 38px; min-width: 38px; max-width: 38px; height: 28px; font-family: inherit; font-size: 1em; font-weight: bold; color: #fff; background: #1976d2; border: none; border-radius: 6px;">Y</button>
                        </div>
                        </label>
                        <label style="font-family: inherit; font-size: inherit; color: #333; font-weight: bold; margin-bottom: 8px; user-select: none; display: flex; flex-direction: row; align-items: center; justify-content: flex-start; width: 100%;">
                            <span style="flex:1; text-align: left;">Keypad</span>
                            <input type="checkbox" id="toggle-keypad" style="margin-left: 8px;">
                        </label>
                        <div id="keypad-debug-subpanel" style="margin: 12px 0 16px 0; padding: 10px 0 0 0; border-top: 2px solid #bbb; border-bottom: 2px solid #bbb; background: #f3f6fa; border-radius: 8px;">
                            <div style="margin-top: 8px;" id="keypad-debug-content">
                                <div style="display: flex; flex-direction: row; align-items: center; margin-bottom: 6px; font-family: inherit; font-size: inherit; justify-content: flex-end;">
                                    <span style="font-weight: bold; width: 72px; min-width: 72px; max-width: 72px; color: #333; display: inline-block;">Event:</span>
                                    <button id="debug-event-value" style="width: 120px; min-width: 120px; max-width: 120px; height: 32px; font-family: inherit; font-size: 1em; font-weight: bold; color: #fff; background: #1976d2; border: none; border-radius: 6px; text-align: right; margin-left: auto;">&nbsp;</button>
                                </div>
                                <div style="display: flex; flex-direction: row; align-items: center; margin-bottom: 6px; font-family: inherit; font-size: inherit; justify-content: flex-end;">
                                    <span style="font-weight: bold; width: 60px; color: #333;">Focus:</span>
                                    <button id="debug-focus-value" style="width: 120px; min-width: 120px; max-width: 120px; height: 32px; font-family: inherit; font-size: 1em; font-weight: bold; color: #fff; background: #1976d2; border: none; border-radius: 6px; text-align: right; margin-left: auto;">&nbsp;</button>
                                </div>
                                <div style="display: flex; flex-direction: row; align-items: center; font-family: inherit; font-size: inherit; justify-content: flex-end;">
                                    <span style="font-weight: bold; width: 60px; color: #333;">Value:</span>
                                    <button id="debug-value-value" style="width: 120px; min-width: 120px; max-width: 120px; height: 32px; font-family: inherit; font-size: 1em; font-weight: bold; color: #fff; background: #1976d2; border: none; border-radius: 6px; text-align: right; margin-left: auto;">&nbsp;</button>
                                </div>
                            </div>
                            <div id="keypad-debug-placeholder" style="display:none; text-align:center; color:#b00; font-weight:bold; font-size:1.08em; padding: 18px 0;">Keypad debug info hidden</div>
                        </div>
                    </div>
                </div>
                <script>
                                                // Simulated Keypad AutoTester Checkbox
                                                (function() {
                                                    let autotesterActive = false;
                                                    let autotesterTimeout = null;
                                                    function autoTestStep() {
                                                        if (!autotesterActive) return;
                                                        console.log('[AutoTester] Simulating ArrowRight key press');
                                                        const rightEvent = new KeyboardEvent('keydown', { key: 'ArrowRight', bubbles: true });
                                                        window.dispatchEvent(rightEvent);
                                                        setTimeout(() => {
                                                            if (!autotesterActive) return;
                                                            console.log('[AutoTester] Simulating ArrowUp key press');
                                                            const upEvent = new KeyboardEvent('keydown', { key: 'ArrowUp', bubbles: true });
                                                            window.dispatchEvent(upEvent);
                                                            autotesterTimeout = setTimeout(autoTestStep, 3000);
                                                        }, 3000);
                                                    }
                                                    const checkbox = document.getElementById('toggle-autotester');
                                                    if (checkbox) {
                                                        checkbox.addEventListener('change', function() {
                                                            autotesterActive = checkbox.checked;
                                                            if (autotesterActive) {
                                                                autoTestStep();
                                                            } else {
                                                                if (autotesterTimeout) clearTimeout(autotesterTimeout);
                                                            }
                                                        });
                                                    }
                                                })();
                                // Keypad toggle logic for debug subpanel
                                (function() {
                                    const keypadToggle = document.getElementById('toggle-keypad');
                                    const subpanel = document.getElementById('keypad-debug-subpanel');
                                    const content = document.getElementById('keypad-debug-content');
                                    const placeholder = document.getElementById('keypad-debug-placeholder');
                                    if (keypadToggle && subpanel && content && placeholder) {
                                        function updateKeypadPanel() {
                                            if (keypadToggle.checked) {
                                                content.style.display = '';
                                                placeholder.style.display = 'none';
                                                subpanel.style.opacity = '1';
                                            } else {
                                                content.style.display = 'none';
                                                placeholder.style.display = '';
                                                subpanel.style.opacity = '0.7';
                                            }
                                        }
                                        keypadToggle.addEventListener('change', updateKeypadPanel);
                                        // Initialize on load
                                        updateKeypadPanel();
                                    }
                                })();
                // Make the debug panel draggable
                (function() {
                    const panel = document.getElementById('debug-event-panel');
                    const title = document.getElementById('debug-panel-title');
                    let isDragging = false, startX = 0, startY = 0, origX = 0, origY = 0;
                    if (panel && title) {
                        title.addEventListener('mousedown', function(e) {
                            isDragging = true;
                            startX = e.clientX;
                            startY = e.clientY;
                            const rect = panel.getBoundingClientRect();
                            origX = rect.left;
                            origY = rect.top;
                            document.body.style.userSelect = 'none';
                        });
                        document.addEventListener('mousemove', function(e) {
                            if (!isDragging) return;
                            const dx = e.clientX - startX;
                            const dy = e.clientY - startY;
                            panel.style.left = (origX + dx) + 'px';
                            panel.style.top = (origY + dy) + 'px';
                        });
                        document.addEventListener('mouseup', function() {
                            isDragging = false;
                            document.body.style.userSelect = '';
                        });
                    }
                })();
                </script>
            </div>
            <div id="tstat-container" style="position: relative; width: 320px; height: 480px; margin: auto;">
            <img id="ref-photo" src="" style="
                position: absolute; 
                top: 0; left: 0; 
                width: 100%; height: 100%; 
                z-index: 100; 
                opacity: 0.5; 
                pointer-events: none; 
                display: none;">
            <div class="device-bezel">
                <!-- <div class="vent-slots"></div> -->
                <div id="tstat-lcd-container" style="
                    display: flex;
                    flex-direction: column;
                    align-items: center;
                    justify-content: center;
                    font-family: 'Segoe UI', Arial, sans-serif;
                "></div>
                                <div class="compass-logo">
                                    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                                        <!-- Outer grey circle -->
                                        <circle cx="50" cy="50" r="48" stroke="#888" stroke-width="2" fill="none" />
                                        <!-- Main NEWS arrows -->
                                        <polygon points="50,10 54,30 50,26 46,30" fill="#888" /> <!-- N -->
                                        <polygon points="90,50 70,54 74,50 70,46" fill="#888" /> <!-- E -->
                                        <polygon points="50,90 54,70 50,74 46,70" fill="#888" /> <!-- S -->
                                        <polygon points="10,50 30,54 26,50 30,46" fill="#888" /> <!-- W -->
                                        <!-- 12 small ticks/arrows -->
                                        <g stroke="#bbb" stroke-width="1.2">
                                            <line x1="50" y1="18" x2="50" y2="26" />
                                            <line x1="50" y1="82" x2="50" y2="74" />
                                            <line x1="18" y1="50" x2="26" y2="50" />
                                            <line x1="82" y1="50" x2="74" y2="50" />
                                            <line x1="32" y1="32" x2="38" y2="38" />
                                            <line x1="68" y1="32" x2="62" y2="38" />
                                            <line x1="32" y1="68" x2="38" y2="62" />
                                            <line x1="68" y1="68" x2="62" y2="62" />
                                            <line x1="50" y1="10" x2="50" y2="18" />
                                            <line x1="50" y1="90" x2="50" y2="82" />
                                            <line x1="10" y1="50" x2="18" y2="50" />
                                            <line x1="90" y1="50" x2="82" y2="50" />
                                        </g>
                                    </svg>
                                </div>
                <div class="physical-buttons">
                    <button class="hw-btn" id="hw-btn-left">◀</button>
                    <button class="hw-btn" id="hw-btn-down">▼</button>
                    <button class="hw-btn" id="hw-btn-up">▲</button>
                    <button class="hw-btn" id="hw-btn-right">▶</button>
                </div>
            </div>
        </div>
            <link rel="stylesheet" href="simulator.css">
            <link rel="stylesheet" href="lcd-content.css">
            <script src="network-settings-renderer.js"></script>
            <script src="lcd-content.js"></script>
            <!-- Logic moved to ui-bridge.js for CSP compliance -->
        </div>
        <div style="text-align: center; margin-top: 20px; color: #222; font-family: sans-serif;">
            <button id="show-main-photo">Show Main Photo</button>
            <button id="show-settings-photo">Show Settings Photo</button>
            <button id="hide-photo">Hide Photo</button>
        </div>
    </div>
    <!-- Base64 image logic moved to ui-bridge.js for CSP compliance -->
    <script src="mock_bridge.js"></script>
    <script src="ui-bridge.js"></script>
</body>
</html>
